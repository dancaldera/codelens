<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: file:; connect-src 'none'; object-src 'none'; base-uri 'none'; frame-src 'none'">
  <title>CodeLens</title>
  <link rel="stylesheet" href="styles/app.css">
  <link rel="stylesheet" href="vendor/github-dark.min.css">
  <script src="vendor/purify.min.js"></script>
  <script src="vendor/marked.umd.js"></script>
  <script src="vendor/highlight.min.js"></script>
</head>
<body>
  <div id="app">
    <div class="sidebar">
      <div id="screenshots"></div>
    </div>
    <div class="content">
      <div class="status-dock" aria-label="Model status">
        <div id="modelInfo" class="info-badge model-card">OpenRouter</div>
        <div id="sttModelInfo" class="info-badge model-card stt-badge">Voice</div>
      </div>
      <div id="recordingStatus" class="recording-card hidden" aria-live="polite"></div>
      <div id="result"></div>
    </div>
    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <span>Analyzing...</span>
    </div>
  </div>
  <script src="dist/src/renderer.js"></script>
</body>
</html>
